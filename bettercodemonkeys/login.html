<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ CodeQuest // Access Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Orbitron:wght@400;700&family=Syncopate:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script>
        // GLOBAL ATTRIBUTE LIFECYCLE GUARD: Sync theme instantly before page layout loads
        (function() {
            const savedTheme = localStorage.getItem('globalThemeSelection') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: var(--bg-color);">

    <div class="challenge-box" id="accessWindow" style="width: 100%; max-width: 400px; box-sizing: border-box; margin: 20px;">
        <div class="corner-tick tl"></div><div class="corner-tick tr"></div>
        
        <div id="loginSection">
            <h3 class="header-sync" style="font-family: 'Orbitron', sans-serif; font-size: 0.9rem; margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">// SECURE_USER_LOGIN</h3>
            <p style="font-size: 0.75rem; margin: 12px 0; color: var(--text-secondary);">Authenticate access sequence keys to enter the main developer grid node.</p>
            
            <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-secondary);">[ INPUT_USER_ID ]</label>
                    <input type="text" required placeholder="Enter username..." style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px; font-family: 'Share Tech Mono', monospace; outline: none; border-radius: 4px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-secondary);">[ PASSWORD_STRING ]</label>
                    <input type="password" required placeholder="Enter passcode..." style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px; font-family: 'Share Tech Mono', monospace; outline: none; border-radius: 4px;">
                </div>
                <button type="submit" class="cyber-btn" style="margin-top: 10px; padding: 12px 0;">INITIALIZE_ACCESS //</button>
            </form>
            
            <p style="font-size: 0.75rem; text-align: center; margin-top: 20px; color: var(--text-secondary);">
                New agent? <a href="#" id="toSignupBtn" style="color: var(--text-primary); font-weight: bold; text-decoration: underline;">Create credential profile</a>
            </p>
        </div>

        <div id="signupSection" style="display: none;">
            <h3 class="header-sync" style="font-family: 'Orbitron', sans-serif; font-size: 0.9rem; margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">// REGISTER_NEW_PROFILE</h3>
            <p style="font-size: 0.75rem; margin: 12px 0; color: var(--text-secondary);">Compile localized user information blocks into the global storage directory matrix.</p>
            
            <form id="signupForm" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-secondary);">[ CHOOSE_USER_ID ]</label>
                    <input type="text" required placeholder="Select username..." style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px; font-family: 'Share Tech Mono', monospace; outline: none; border-radius: 4px;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-secondary);">[ SELECT_TIER ]</label>
                    <select id="ageGroupSelect" style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px; font-family: 'Share Tech Mono', monospace; outline: none; border-radius: 4px;">
                        <option value="Kids">KIDS MODE (BLOCK-BASED)</option>
                        <option value="Teens">TEEN WORKSPACE (TEXT-BASED)</option>
                        <option value="Adults">ADULT TERMINAL (TEXT-BASED)</option>
                    </select>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: var(--text-secondary);">[ CREATE_PASSWORD ]</label>
                    <input type="password" required placeholder="Choose secure passcode..." style="background: var(--input-bg); color: var(--text-primary); border: 1px solid var(--border-color); padding: 10px; font-family: 'Share Tech Mono', monospace; outline: none; border-radius: 4px;">
                </div>
                <button type="submit" class="cyber-btn" style="margin-top: 10px; padding: 12px 0;">COMPILE_CREDENTIALS //</button>
            </form>
            
            <p style="font-size: 0.75rem; text-align: center; margin-top: 20px; color: var(--text-secondary);">
                Have account? <a href="#" id="toLoginBtn" style="color: var(--text-primary); font-weight: bold; text-decoration: underline;">Return to log in</a>
            </p>
        </div>

        <div class="corner-tick bl"></div><div class="corner-tick br"></div>
    </div>

    <script>
        const loginSection = document.getElementById('loginSection');
        const signupSection = document.getElementById('signupSection');
        
        // Dynamic visibility card switcher links
        document.getElementById('toSignupBtn').addEventListener('click', (e) => {
            e.preventDefault();
            loginSection.style.display = 'none';
            signupSection.style.display = 'block';
        });

        document.getElementById('toLoginBtn').addEventListener('click', (e) => {
            e.preventDefault();
            signupSection.style.display = 'none';
            loginSection.style.display = 'block';
        });

        // Form Submit Interceptions (Forwards instantly to your workspace index.html dashboard)
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = 'index.html';
        });

        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Save selected difficulty mode so lesson.html configures block vs text code modes dynamically
            const chosenTier = document.getElementById('ageGroupSelect').value;
            localStorage.setItem('currentAgeGroup', chosenTier);
            
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
